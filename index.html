<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部活動フォトアルバム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f9; color: #333; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 20px; }
        
        .auth-section { margin-bottom: 20px; padding: 15px; border-bottom: 2px solid #eee; }
        input[type="password"], select { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; width: 80%; max-width: 300px; }
        
        /* スマホで突き抜けないためのファイル入力修正 */
        input[type="file"] { 
            padding: 10px; margin: 10px 0; font-size: 14px; width: 100%; box-sizing: border-box; 
        }

        button { cursor: pointer; transition: 0.3s; background: #5865F2; color: white; border: none; font-weight: bold; padding: 12px 20px; border-radius: 8px; margin: 5px; }
        
        .admin-panel { display: none; background: #eef2ff; padding: 20px; border-radius: 10px; border: 2px dashed #5865F2; margin: 20px 0; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .img-card { background: #fff; padding: 8px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
        
        /* 時間を消して日付だけに */
        .img-date { font-size: 11px; color: #7f8c8d; display: block; }
        
        #status-msg { color: #5865F2; font-weight: bold; margin: 10px 0; font-size: 14px; }
        .refresh-btn { background: #95a5a6; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 部活動フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
        <div id="admin-login-area" style="margin-top:10px;">
            <button onclick="loginDiscord()" id="login-btn" style="background:#7289da;">管理者ログイン</button>
            <button onclick="logout()" id="logout-btn" style="background:#ff4757; display:none;">ログアウト</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- 部活を選択 --</option>
            <option value="バスケットボール部">バスケットボール部</option>
            <option value="ソフトテニス部">ソフトテニス部</option>
            <option value="バレーボール部">バレーボール部</option>
            <option value="マッチョ部">マッチョ部</option>
            <option value="ダンス部">ダンス部</option>
            <option value="弓道部">弓道部</option>
            <option value="水泳部">水泳部</option>
            <option value="剣道部">剣道部</option>
            <option value="応援部">応援部</option>
            <option value="クリエイティ部">クリエイティ部</option>
            <option value="被服手芸部">被服手芸部</option>
            <option value="五光倶楽部">五光倶楽部</option>
            <option value="吹奏楽部">吹奏楽部</option>
            <option value="料理部">料理部</option>
            <option value="演劇部">演劇部</option>
            <option value="園芸部">園芸部</option>
            <option value="書道部">書道部</option>
            <option value="茶道部">茶道部</option>
            <option value="写真部">写真部</option>
            <option value="天文部">天文部</option>
            <option value="学園長">学園長</option>
            <option value="一般生徒">一般生徒</option>
        </select>
        <br>
        <input type="file" id="file-input" accept="image/*" multiple>
        <br>
        <button onclick="uploadImages()" style="background:#2ecc71;">一括投稿する</button>
        <div id="status-msg"></div>
    </div>

    <h2 id="club-display">合言葉を入れてください</h2>
    <button onclick="loadImages()" class="refresh-btn" id="refresh-ui" style="display:none;">最新に更新 🔄</button>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    const CLOUD_NAME = "dn8jcukh0"; 
    const CLIENT_ID = "1483619678940303410"; // ここを自分のものに

    const clubData = {
        "Basket24!": "バスケットボール部", "SoftTennis7": "ソフトテニス部", "VolleyGo11": "バレーボール部",
        "Muscle99!": "マッチョ部", "DanceStep8": "ダンス部", "KyudoArrow1": "弓道部",
        "SwimBlue25": "水泳部", "KendoSpirit3": "剣道部", "CheerUp55!": "応援部",
        "CreativeLab9": "クリエイティ部", "SewingTime6": "被服手芸部", "GokouClub5": "五光倶楽部",
        "BrassSound4": "吹奏楽部", "CookingStar2": "料理部", "TheaterAct7": "演劇部",
        "GardenBloom8": "園芸部", "Calligraphy10": "書道部", "TeaZen12": "茶道部",
        "PhotoSnap3": "写真部", "StarSky88": "天文部",
        "PrincipalZero0": "学園長", "StudentBase0": "一般生徒"
    };

    let currentTag = "";
    let isAdmin = false;

    window.onload = () => {
        const savedAdmin = localStorage.getItem('isAdmin');
        const savedTag = localStorage.getItem('currentTag');
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        
        if (token) {
            isAdmin = true;
            localStorage.setItem('isAdmin', 'true');
            history.replaceState(null, null, window.location.pathname);
        } else if (savedAdmin === 'true') {
            isAdmin = true;
        }

        if (isAdmin) {
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
        }

        if (savedTag) {
            currentTag = savedTag;
            document.getElementById('club-display').innerText = currentTag;
            document.getElementById('refresh-ui').style.display = 'inline-block';
            document.getElementById('admin-club-select').value = currentTag;
            loadImages();
        }
    };

    function logout() { localStorage.clear(); location.reload(); }

    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            localStorage.setItem('currentTag', currentTag);
            loadImages();
            document.getElementById('refresh-ui').style.display = 'inline-block';
            document.getElementById('club-display').innerText = currentTag;
        } else { alert("合言葉が違います"); }
    }

    function syncClub() {
        currentTag = document.getElementById('admin-club-select').value;
        if (currentTag) {
            localStorage.setItem('currentTag', currentTag);
            loadImages();
            document.getElementById('club-display').innerText = currentTag;
        }
    }

    // ✨ 反映されない対策を強化した読み込み
    async function loadImages() {
        if (!currentTag) return;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "読込中...";
        
        try {
            // cbパラメータでキャッシュを完全に回避
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?cb=${Date.now()}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            
            gallery.innerHTML = "";
            data.resources.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            data.resources.forEach(img => {
                const card = document.createElement('div');
                card.className = 'img-card';
                
                // 日付のみ取得
                const d = new Date(img.created_at);
                const dateOnly = `${d.getFullYear()}/${(d.getMonth()+1)}/${d.getDate()}`;

                const imgUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                card.innerHTML = `
                    <img src="${imgUrl}" onclick="window.open('${imgUrl}', '_blank')">
                    <span class="img-date">${dateOnly}</span>
                `;
                gallery.appendChild(card);
            });
        } catch (e) {
            gallery.innerHTML = "<p>まだ画像がないか、読込エラーです。更新ボタンを試してください。</p>";
        }
    }

    async function uploadImages() {
        const fileInput = document.getElementById('file-input');
        const files = fileInput.files;
        if(!currentTag || files.length === 0) return alert("部活と画像を選んでね");

        const status = document.getElementById('status-msg');
        status.style.display = "block";
        
        for (let i = 0; i < files.length; i++) {
            status.innerText = `${i + 1}/${files.length}枚目を送信中...`;
            const formData = new FormData();
            formData.append('file', files[i]);
            formData.append('upload_preset', 'ml_default');
            formData.append('tags', currentTag);

            await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        }

        status.innerText = "完了！反映されない場合は「更新」を押してね";
        fileInput.value = "";
        setTimeout(() => { status.style.display = "none"; loadImages(); }, 1500);
    }

    function loginDiscord() {
        const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify`;
        window.location.href = url;
    }
</script>

</body>
</html>
