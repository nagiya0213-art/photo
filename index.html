<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放送広報フォトアルバム（修正版）</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .debug-log { background: #333; color: #0f0; text-align: left; padding: 10px; font-family: monospace; font-size: 11px; border-radius: 5px; margin: 10px 0; max-height: 150px; overflow-y: auto; }
        .error-display { color: #ff4757; font-weight: bold; border: 2px solid #ff4757; padding: 10px; margin: 10px 0; display: none; background: #fff1f2; }
        .admin-panel { background: #eef2ff; padding: 20px; border-radius: 10px; border: 2px dashed #5865F2; margin: 20px 0; }
        select, input, button { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #5865F2; color: white; border: none; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
        img { width: 100%; height: 110px; object-fit: cover; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ フォトアルバム</h1>

    <div id="error-box" class="error-display"></div>
    <div id="debug-console" class="debug-log">システムログ待機中...</div>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- 読込中 --</option>
        </select>
        <br>
        <input type="file" id="file-input" accept="image/*" multiple>
        <button onclick="uploadImages()" style="background:#2ecc71;">一括投稿する</button>
    </div>

    <h2 id="club-display">合言葉を入れてね</h2>
    <div id="gallery-container"></div>
</div>

<script>
    // --- 【設定】 ---
    const CLOUD_NAME = "dn8jcukh0";
    const CLIENT_ID = "1483619678940303410"; 
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq1silbLpzyiWDBvelhaP30L_h8lqImVBHque9AbTGJ-VEIMjWfE8-k8jlddOGgFo9CbOoeaDqGSzX/pub?gid=0&single=true&output=csv"; 
    // ---------------

    let clubData = {};
    let currentTag = "";

    function log(msg, isError = false) {
        const consoleEl = document.getElementById('debug-console');
        consoleEl.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${isError ? '<span style="color:red">ERR:</span> ' : ''}${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    window.onload = async () => {
        log("スプレッドシート取得開始...");
        await fetchClubList();
    };

    async function fetchClubList() {
        const select = document.getElementById('admin-club-select');
        const errorBox = document.getElementById('error-box');

        try {
            // 💡 ポイント：?cb=...を付けずにfetchする（スプシの400エラー対策）
            const res = await fetch(SPREADSHEET_CSV_URL);
            log(`HTTPステータス: ${res.status}`);

            if (!res.ok) throw new Error(`Status: ${res.status}`);

            const text = await res.text();
            log(`データ受信完了 (${text.length} bytes)`);

            const rows = text.split(/\r?\n/);
            select.innerHTML = '<option value="">-- 投稿先の部活を選択 --</option>';
            clubData = {};
            let count = 0;

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const pass = cols[0].trim().replace(/^"|"$/g, '');
                    const name = cols[1].trim().replace(/^"|"$/g, '');
                    
                    // 💡 ゴミデータ排除
                    if (!pass || !name || pass.includes("initial-scale") || pass === "合言葉") return;

                    clubData[pass] = name;
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                    count++;
                }
            });

            if (count === 0) throw new Error("有効なリストが0件です。CSVの形式を確認してください。");
            log(`成功：${count}件読み込みました。`);
            errorBox.style.display = "none";

        } catch (e) {
            log(e.message, true);
            errorBox.innerText = `【接続エラー】${e.message}\nスプレッドシートがCSV形式で公開されているか確認してください。`;
            errorBox.style.display = "block";
        }
    }

    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        } else {
            alert("合言葉が違います");
        }
    }

    async function loadImages() {
        if (!currentTag) return;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "読込中...";
        try {
            // Cloudinaryは ?cb= を付けても大丈夫（キャッシュ回避）
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?cb=${Date.now()}`);
            if (!res.ok) {
                container.innerHTML = res.status === 404 ? "まだ画像がありません。" : "取得エラー";
                return;
            }
            const data = await res.json();
            renderGallery(data.resources);
        } catch (e) {
            container.innerHTML = "読み込み失敗";
        }
    }

    function renderGallery(resources) {
        const container = document.getElementById('gallery-container');
        let html = '<div class="gallery">';
        resources.forEach(img => {
            const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
            html += `<img src="${url}" onclick="window.open('${url}', '_blank')">`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function syncClub() {
        currentTag = document.getElementById('admin-club-select').value;
        if(currentTag) {
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        }
    }

    async function uploadImages() {
        const fileInput = document.getElementById('file-input');
        const files = fileInput.files;
        if(!currentTag || files.length === 0) return alert("画像を選んでね");
        for (let file of files) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default');
            formData.append('tags', currentTag);
            await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        }
        alert("完了！");
        loadImages();
    }
</script>
</body>
</html>
