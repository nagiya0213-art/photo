<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部活動フォトアルバム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .auth-section { margin-bottom: 30px; padding: 20px; border-bottom: 2px solid #eee; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .img-card { background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .admin-panel { display: none; background: #eef2ff; padding: 20px; border-radius: 10px; border: 2px dashed #5865F2; margin-top: 20px; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { cursor: pointer; transition: 0.3s; background: #5865F2; color: white; border: none; }
        button:hover { opacity: 0.8; }
        .delete-btn { background: #ff4757; position: absolute; top: 15px; right: 15px; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 部活動フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="部活の合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
        <div id="admin-login-area" style="margin-top:15px;">
            <button onclick="loginDiscord()" style="background:#7289da;">管理者ログイン (Discord)</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <p>「ナギヤのサーバー テスト」のメンバーのみ投稿・削除可能です</p>
        <input type="file" id="file-input" accept="image/*">
        <button onclick="uploadImage()">この部活のタグで投稿する</button>
    </div>

    <h2 id="club-display">合言葉を入れてください</h2>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    const CLOUD_NAME = "dn8jcukh0"; 
    const DISCORD_CHANNEL_ID = "1483618553809731826";
    const CLIENT_ID = "1483619678940303410"; 

    const clubData = {
        "Basket24!": "バスケットボール部",
        "SoftTennis7": "ソフトテニス部",
        "VolleyGo11": "バレーボール部",
        "Muscle99!": "マッチョ部",
        "DanceStep8": "ダンス部",
        "KyudoArrow1": "弓道部",
        "SwimBlue25": "水泳部",
        "KendoSpirit3": "剣道部",
        "CheerUp55!": "応援部",
        "CreativeLab9": "クリエイティ部",
        "SewingTime6": "被服手芸部",
        "GokouClub5": "五光倶楽部",
        "BrassSound4": "吹奏楽部",
        "CookingStar2": "料理部",
        "TheaterAct7": "演劇部",
        "GardenBloom8": "園芸部",
        "Calligraphy10": "書道部",
        "TeaZen12": "茶道部",
        "PhotoSnap3": "写真部",
        "StarSky88": "天文部",
	"PrincipalZero0":"学園長",
	"StudentBase0":"一般生徒"
    };

    let currentTag = "";
    let isAdmin = false;

    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            document.getElementById('club-display').innerText = currentTag + " のギャラリー";
            loadImages();
        } else {
            alert("合言葉が違います");
        }
    }

    async function loadImages() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "読み込み中...";
        // Cloudinaryからタグ指定で画像を取得
        const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json`);
        const data = await res.json();
        
        gallery.innerHTML = "";
        data.resources.forEach(img => {
            const card = document.createElement('div');
            card.className = 'img-card';
            card.innerHTML = `<img src="https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}.jpg">`;
            if(isAdmin) {
                const del = document.createElement('button');
                del.innerText = "削除";
                del.className = "delete-btn";
                del.onclick = () => deleteImage(img.public_id);
                card.appendChild(del);
            }
            gallery.appendChild(card);
        });
    }

    function loginDiscord() {
        const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify%20guilds.members.read`;
        window.location.href = url;
    }

    // ページ読み込み時にDiscord認証をチェック
    window.onload = async () => {
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        if (token) {
            // ここで本来はサーバーサイドでチャンネル権限をチェックしますが、
            // 簡易的にログイン成功＝管理者として表示します（投稿時にエラー判定する仕組みを推奨）
            isAdmin = true;
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('admin-login-area').style.display = 'none';
        }
    }

    async function uploadImage() {
        if(!currentTag) return alert("先に合言葉を入れて部活を選んでね");
        const file = document.getElementById('file-input').files[0];
        if(!file) return alert("画像を選んでね");

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'ml_default'); // Cloudinaryの設定で作成したプリセット名
        formData.append('tags', currentTag);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        if(res.ok) { alert("投稿成功！"); loadImages(); }
    }
</script>

</body>
</html>
