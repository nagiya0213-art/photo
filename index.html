<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部活動フォトアルバム</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .auth-section, .admin-panel { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #5865F2; color: white; border: none; cursor: pointer; font-weight: bold; }
        .post-group { background: #fff; margin-top: 20px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: left; }
        .post-date { font-size: 13px; color: #666; font-weight: bold; display: block; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        .post-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        img { width: 100%; height: 130px; object-fit: cover; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 部活動フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉">
        <button onclick="checkPassword()">画像を見る</button>
        <div style="margin-top:10px;">
            <button onclick="loginDiscord()" id="login-btn">管理者ログイン</button>
            <button onclick="logout()" id="logout-btn" style="display:none; background:#ff4757;">ログアウト</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel" style="display:none;">
        <select id="admin-club-select"></select><br>
        <input type="file" id="file-input" accept="image/*" multiple><br>
        <button onclick="uploadImages()" id="upload-btn" style="background:#2ecc71;">画像を投稿する</button>
        <div id="status-msg" style="margin-top:10px; font-weight:bold;"></div>
    </div>

    <h2 id="club-display">合言葉を入力してください</h2>
    <div id="gallery-groups"></div>
</div>

<script>
    const CLOUD_NAME = "dn8jcukh0"; 
    const CLIENT_ID = "1483619678940303410"; 

    const clubData = {
        "Basket24!": "バスケットボール部", "SoftTennis7": "ソフトテニス部", "VolleyGo11": "バレーボール部",
        "Muscle99!": "マッチョ部", "DanceStep8": "ダンス部", "KyudoArrow1": "弓道部",
        "SwimBlue25": "水泳部", "KendoSpirit3": "剣道部", "CheerUp55!": "応援部",
        "CreativeLab9": "クリエイティ部", "SewingTime6": "被服手芸部", "GokouClub5": "五光倶楽部",
        "BrassSound4": "吹奏楽部", "CookingStar2": "料理部", "TheaterAct7": "演劇部",
        "GardenBloom8": "園芸部", "Calligraphy10": "書道部", "TeaZen12": "茶道部",
        "PhotoSnap3": "写真部", "StarSky88": "天文部",
        "PrincipalZero0": "学園長", "StudentBase0": "一般生徒"
    };

    let currentClub = localStorage.getItem('currentClub') || "";
    let isAdmin = localStorage.getItem('isAdmin') === 'true';

    const select = document.getElementById('admin-club-select');
    Object.values(clubData).forEach(v => {
        let o = document.createElement('option'); o.value=v; o.innerText=v; select.appendChild(o);
    });

    window.onload = () => {
        const params = new URLSearchParams(window.location.hash.slice(1));
        if (params.get('access_token')) { isAdmin = true; localStorage.setItem('isAdmin', 'true'); }
        if (isAdmin) {
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
        }
        if (currentClub) {
            document.getElementById('club-display').innerText = currentClub;
            select.value = currentClub;
            loadImages();
        }
    };

    function checkPassword() {
        const p = document.getElementById('pass-input').value;
        if (clubData[p]) { currentClub = clubData[p]; localStorage.setItem('currentClub', currentClub); location.reload(); }
        else { alert("合言葉が違います"); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- 読み込み：JSONファイル読み込みをやめ、直接的なURL構築に変更 ---
    async function loadImages() {
        if (!currentClub) return;
        const gallery = document.getElementById('gallery-groups');
        gallery.innerHTML = "読み込み中...";
        
        try {
            // キャッシュ対策で最新のリストを取得
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentClub)}.json?v=${Date.now()}`);
            if (!res.ok) throw new Error("画像がありません");
            
            const data = await res.json();
            const groups = {};

            data.resources.forEach(img => {
                // ここでJSONファイルを物理的に弾く
                if (img.format === 'json' || img.public_id === currentClub) return;

                // 投稿単位(groupId)を取得。なければIDをキーにする
                const gid = (img.tags || []).find(t => t.startsWith('group_')) || `single_${img.public_id}`;
                
                if (!groups[gid]) groups[gid] = { images: [], date: img.created_at };
                groups[gid].images.push(img);
            });

            gallery.innerHTML = "";
            const sorted = Object.values(groups).sort((a,b) => new Date(b.date) - new Date(a.date));

            sorted.forEach(g => {
                const d = new Date(g.date);
                // 表示は「年月日」のみに限定
                const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
                
                const html = g.images.map(i => {
                    const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${i.version}/${i.public_id}.${i.format}`;
                    return `<img src="${url}" onclick="window.open('${url}')">`;
                }).join('');
                
                const div = document.createElement('div');
                div.className = 'post-group';
                div.innerHTML = `<span class="post-date">📅 ${dateStr} の投稿</span><div class="post-images">${html}</div>`;
                gallery.appendChild(div);
            });
        } catch (e) { gallery.innerHTML = `<p>${e.message}</p>`; }
    }

    // --- アップロード：反映の遅さを解消するために、各画像にユニークな「タイムスタンプ付きタグ」を刻印 ---
    async function uploadImages() {
        const files = Array.from(document.getElementById('file-input').files).filter(f => f.type.startsWith('image/'));
        if (files.length === 0) return alert("画像を選択してください");

        const status = document.getElementById('status-msg');
        const btn = document.getElementById('upload-btn');
        btn.disabled = true;
        
        // ✨ この投稿回を識別するID
        const groupId = `group_${Date.now()}`;
        const targetClub = document.getElementById('admin-club-select').value;

        for (let i = 0; i < files.length; i++) {
            status.innerText = `${i+1}/${files.length}枚目をアップロード中...`;
            const fd = new FormData();
            fd.append('file', files[i]);
            fd.append('upload_preset', 'ml_default');
            // ここでグループIDを付与。これにより、loadImages側で確実に判別可能になる
            fd.append('tags', `${targetClub},${groupId}`);

            await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
        }

        status.innerText = "完了！リストを更新します...";
        
        // Cloudinaryの反映ラグ（30秒）を短縮させるため、
        // 1秒おきに5回、リストの再読み込みを試行する
        let count = 0;
        const retry = setInterval(async () => {
            await loadImages();
            count++;
            if (count > 5) {
                clearInterval(retry);
                btn.disabled = false;
                status.innerText = "";
            }
        }, 1500);
    }

    function loginDiscord() {
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify`;
    }
</script>
</body>
</html>
