<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放送広報フォトアルバム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f9; color: #333; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 20px; }
        .auth-section { margin-bottom: 20px; padding: 15px; border-bottom: 2px solid #eee; }
        input[type="password"], select { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; width: 80%; max-width: 300px; }
        input[type="file"] { padding: 10px; margin: 10px 0; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.3s; background: #5865F2; color: white; border: none; font-weight: bold; padding: 12px 20px; border-radius: 8px; margin: 5px; }
        .admin-panel { display: none; background: #eef2ff; padding: 20px; border-radius: 10px; border: 2px dashed #5865F2; margin: 20px 0; }
        .post-group { background: #fff; margin-top: 20px; padding: 15px; border-radius: 12px; border: 1px solid #eee; text-align: left; }
        .post-date { font-size: 13px; color: #7f8c8d; font-weight: bold; display: block; border-bottom: 1px solid #f0f0f0; margin-bottom: 10px; padding-bottom: 5px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        img { width: 100%; height: 110px; object-fit: cover; border-radius: 6px; cursor: pointer; background: #eee; }
        #status-msg { color: #5865F2; font-weight: bold; margin: 10px 0; font-size: 14px; }
        .refresh-btn { background: #95a5a6; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ 放送広報フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
        <div id="admin-login-area" style="margin-top:10px;">
            <button onclick="loginDiscord()" id="login-btn" style="background:#7289da;">管理者ログイン</button>
            <button onclick="logout()" id="logout-btn" style="background:#ff4757; display:none;">ログアウト</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- 読み込み中 --</option>
        </select>
        <br>
        <input type="file" id="file-input" accept="image/*" multiple>
        <br>
        <button id="upload-btn" onclick="uploadImages()" style="background:#2ecc71;">一括投稿する</button>
        <div id="status-msg"></div>
    </div>

    <h2 id="club-display">合言葉を入れてください</h2>
    <button onclick="loadImages()" class="refresh-btn" id="refresh-ui" style="display:none;">最新に更新 🔄</button>
    <div id="gallery-container"></div>
</div>

<script>
    // --- 設定エリア ---
    const CLOUD_NAME = "dn8jcukh0";
    const CLIENT_ID = "1483619678940303410"; // Discord Developer PortalのClient IDを入れてください
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq1silbLpzyiWDBvelhaP30L_h8lqImVBHque9AbTGJ-VEIMjWfE8-k8jlddOGgFo9CbOoeaDqGSzX/pub?gid=0&single=true&output=csv"; 
    // ----------------

    let clubData = {};
    let currentTag = "";
    let isAdmin = false;

    window.onload = async () => {
        // スプシからリストを取得
        await fetchClubList();

        // ログイン状態の復元
        const savedAdmin = localStorage.getItem('isAdmin');
        const savedTag = localStorage.getItem('currentTag');
        
        // Discordからのリダイレクト戻りチェック
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        
        if (token) {
            isAdmin = true;
            localStorage.setItem('isAdmin', 'true');
            history.replaceState(null, null, window.location.pathname);
        } else if (savedAdmin === 'true') {
            isAdmin = true;
        }

        if (isAdmin) {
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
        }

        if (savedTag) {
            currentTag = savedTag;
            document.getElementById('club-display').innerText = currentTag;
            document.getElementById('refresh-ui').style.display = 'inline-block';
            document.getElementById('admin-club-select').value = currentTag;
            loadImages();
        }
    };

    async function fetchClubList() {
        try {
            const res = await fetch(`${SPREADSHEET_CSV_URL}?cb=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n');
            const select = document.getElementById('admin-club-select');
            select.innerHTML = '<option value="">-- 投稿先の部活を選択 --</option>';
            clubData = {};
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const pass = cols[0].trim();
                    const name = cols[1].trim();
                    if (pass && name) {
                        clubData[pass] = name;
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    }
                }
            });
        } catch (e) { console.error("スプシ読み込みエラー"); }
    }

    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            localStorage.setItem('currentTag', currentTag);
            document.getElementById('club-display').innerText = currentTag;
            document.getElementById('refresh-ui').style.display = 'inline-block';
            loadImages();
        } else { alert("合言葉が違います"); }
    }

    function syncClub() {
        const selected = document.getElementById('admin-club-select').value;
        if (selected) {
            currentTag = selected;
            localStorage.setItem('currentTag', currentTag);
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        }
    }

    function getStoredImages() {
        const stored = localStorage.getItem('recent_uploads');
        return stored ? JSON.parse(stored) : [];
    }

    async function loadImages() {
        if (!currentTag) return;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "読込中...";
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?cb=${Date.now()}`);
            let cloudResources = res.ok ? (await res.json()).resources : [];
            const mergedMap = new Map();
            getStoredImages().filter(li => li.tag === currentTag).forEach(img => { mergedMap.set(img.public_id, img); });
            cloudResources.forEach(img => { mergedMap.set(img.public_id, img); });
            renderGallery(Array.from(mergedMap.values()));
        } catch (e) { renderGallery(getStoredImages().filter(li => li.tag === currentTag)); }
    }

    function renderGallery(resources) {
        const container = document.getElementById('gallery-container');
        if (resources.length === 0) { container.innerHTML = "<p>まだ画像がありません。</p>"; return; }
        const groups = {};
        resources.forEach(img => {
            if (img.format === 'json') return;
            const d = new Date(img.created_at);
            const key = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            if (!groups[key]) groups[key] = [];
            groups[key].push(img);
        });
        const sortedKeys = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
        let html = "";
        sortedKeys.forEach(date => {
            html += `<div class="post-group"><span class="post-date">📅 ${date} の投稿</span><div class="gallery">`;
            const sortedImages = groups[date].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            sortedImages.forEach(img => {
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                html += `<img src="${url}" onclick="window.open('${url}', '_blank')">`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    async function uploadImages() {
        const fileInput = document.getElementById('file-input');
        const files = fileInput.files;
        if(!currentTag || files.length === 0) return alert("画像を選んでね");
        const status = document.getElementById('status-msg');
        for (let i = 0; i < files.length; i++) {
            status.innerText = `${i+1}/${files.length}枚目を送信中...`;
            const formData = new FormData();
            formData.append('file', files[i]);
            formData.append('upload_preset', 'ml_default');
            formData.append('tags', currentTag);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                const newImg = { public_id: data.public_id, version: data.version, format: data.format, created_at: new Date().toISOString(), tag: currentTag };
                const currentStored = getStoredImages();
                currentStored.unshift(newImg);
                localStorage.setItem('recent_uploads', JSON.stringify(currentStored.slice(0, 50)));
                loadImages();
            } catch (err) { alert("送信に失敗しました"); }
        }
        status.innerText = "完了！";
        fileInput.value = "";
        setTimeout(() => { status.innerText = ""; }, 3000);
    }

    function loginDiscord() {
        const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify`;
        window.location.href = url;
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
