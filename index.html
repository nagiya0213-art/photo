<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デバッグ版：放送広報フォトアルバム</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        .debug-log { background: #333; color: #0f0; text-align: left; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 5px; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .error-display { color: #ff4757; font-weight: bold; border: 1px solid #ff4757; padding: 10px; margin: 10px 0; display: none; }
        .admin-panel { background: #eef2ff; padding: 20px; border-radius: 10px; margin: 20px 0; }
        select, input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        img { width: 100%; height: 110px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ フォトアルバム（スプシ診断モード）</h1>

    <div id="error-box" class="error-display"></div>
    <div id="debug-console" class="debug-log">システムログ待機中...</div>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- スプシ読み込み中 --</option>
        </select>
        <br>
        <input type="file" id="file-input" accept="image/*" multiple>
        <button onclick="uploadImages()">アップロード</button>
    </div>

    <h2 id="club-display">合言葉を入れてください</h2>
    <div id="gallery-container"></div>
</div>

<script>
    // --- 【設定】 ---
    const CLOUD_NAME = "dn8jcukh0";
    const CLIENT_ID = "1483619678940303410"; 
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq1silbLpzyiWDBvelhaP30L_h8lqImVBHque9AbTGJ-VEIMjWfE8-k8jlddOGgFo9CbOoeaDqGSzX/pub?gid=0&single=true&output=csv"; 
    // ---------------

    let clubData = {};
    let currentTag = "";

    // ログ出力用関数
    function log(msg, isError = false) {
        const consoleEl = document.getElementById('debug-console');
        const time = new Date().toLocaleTimeString();
        consoleEl.innerHTML += `<div>[${time}] ${isError ? '<span style="color:red">ERR:</span> ' : ''}${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    window.onload = async () => {
        log("ページ読み込み完了。スプレッドシートの取得を開始します...");
        await fetchClubList();
    };

    async function fetchClubList() {
        const select = document.getElementById('admin-club-select');
        const errorBox = document.getElementById('error-box');

        try {
            log(`Fetching URL: ${SPREADSHEET_CSV_URL}`);
            const res = await fetch(SPREADSHEET_CSV_URL;
            
            log(`Response Status: ${res.status} ${res.statusText}`);

            if (!res.ok) {
                throw new Error(`サーバーがエラーを返しました (Status: ${res.status})。URLが正しいか、公開設定を確認してください。`);
            }

            const text = await res.text();
            log(`取得データサイズ: ${text.length} bytes`);
            
            if (!text.includes(",")) {
                log("警告: 取得したデータにカンマが含まれていません。CSV形式ではない可能性があります。", true);
            }

            const rows = text.split(/\r?\n/);
            select.innerHTML = '<option value="">-- 投稿先の部活を選択 --</option>';
            clubData = {};
            let count = 0;

            rows.forEach((row, index) => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const pass = cols[0].trim().replace(/^"|"$/g, '');
                    const name = cols[1].trim().replace(/^"|"$/g, '');
                    
                    if (!pass || !name || pass.includes("initial-scale") || pass === "合言葉") return;

                    clubData[pass] = name;
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                    count++;
                }
            });

            if (count === 0) {
                throw new Error("CSVデータは見つかりましたが、有効な部活リストが1件もありません。フォーマットを確認してください。");
            }

            log(`成功：${count}件の部活を読み込みました。`);
            errorBox.style.display = "none";

        } catch (e) {
            log(e.message, true);
            errorBox.innerText = `【接続エラー】 ${e.message}`;
            errorBox.style.display = "block";
            select.innerHTML = '<option value="">-- 読み込み失敗 --</option>';
        }
    }

    // --- 以下、既存のロジック ---
    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        } else { alert("合言葉が一致しません。スプシのA列を確認してください。"); }
    }

    async function loadImages() {
        if (!currentTag) return;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "読み込み中...";
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?cb=${Date.now()}`);
            if (!res.ok) {
                if(res.status === 404) {
                    container.innerHTML = "この部活の画像はまだありません。";
                    return;
                }
                throw new Error("Cloudinaryからの取得に失敗しました。");
            }
            const data = await res.json();
            renderGallery(data.resources);
        } catch (e) {
            container.innerHTML = "画像一覧を取得できませんでした。";
            log(e.message, true);
        }
    }

    function renderGallery(resources) {
        const container = document.getElementById('gallery-container');
        let html = '<div class="gallery">';
        resources.forEach(img => {
            const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
            html += `<img src="${url}" onclick="window.open('${url}', '_blank')">`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function syncClub() {
        currentTag = document.getElementById('admin-club-select').value;
        document.getElementById('club-display').innerText = currentTag;
        loadImages();
    }
</script>
</body>
</html>
