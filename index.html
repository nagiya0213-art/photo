<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部活動フォトアルバム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .auth-section { margin-bottom: 30px; padding: 20px; border-bottom: 2px solid #eee; }
        input, button, select { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { cursor: pointer; transition: 0.3s; background: #5865F2; color: white; border: none; font-weight: bold; }
        .admin-panel { display: none; background: #eef2ff; padding: 25px; border-radius: 10px; border: 2px dashed #5865F2; margin: 20px 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; min-height: 200px; }
        .img-card { background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 部活動フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
        <div id="admin-login-area" style="margin-top:15px;">
            <button onclick="loginDiscord()" id="login-btn" style="background:#7289da;">管理者ログイン (Discord)</button>
            <button onclick="logout()" id="logout-btn" style="background:#ff4757; display:none;">ログアウト</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3>🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- 部活を選択 --</option>
            <option value="バスケットボール部">バスケットボール部</option>
            <option value="ソフトテニス部">ソフトテニス部</option>
            <option value="バレーボール部">バレーボール部</option>
            <option value="マッチョ部">マッチョ部</option>
            <option value="ダンス部">ダンス部</option>
            <option value="弓道部">弓道部</option>
            <option value="水泳部">水泳部</option>
            <option value="剣道部">剣道部</option>
            <option value="応援部">応援部</option>
            <option value="クリエイティ部">クリエイティ部</option>
            <option value="被服手芸部">被服手芸部</option>
            <option value="五光倶楽部">五光倶楽部</option>
            <option value="吹奏楽部">吹奏楽部</option>
            <option value="料理部">料理部</option>
            <option value="演劇部">演劇部</option>
            <option value="園芸部">園芸部</option>
            <option value="書道部">書道部</option>
            <option value="茶道部">茶道部</option>
            <option value="写真部">写真部</option>
            <option value="天文部">天文部</option>
            <option value="学園長">学園長</option>
            <option value="一般生徒">一般生徒</option>
        </select>
        <br>
        <input type="file" id="file-input" accept="image/*">
        <button onclick="uploadImage()" style="background:#2ecc71;">投稿する</button>
    </div>

    <h2 id="club-display">合言葉を入れてください</h2>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    const CLOUD_NAME = "dn8jcukh0"; 
    const CLIENT_ID = "1483619678940303410"; 

    const clubData = {
        "Basket24!": "バスケットボール部", "SoftTennis7": "ソフトテニス部", "VolleyGo11": "バレーボール部",
        "Muscle99!": "マッチョ部", "DanceStep8": "ダンス部", "KyudoArrow1": "弓道部",
        "SwimBlue25": "水泳部", "KendoSpirit3": "剣道部", "CheerUp55!": "応援部",
        "CreativeLab9": "クリエイティ部", "SewingTime6": "被服手芸部", "GokouClub5": "五光倶楽部",
        "BrassSound4": "吹奏楽部", "CookingStar2": "料理部", "TheaterAct7": "演劇部",
        "GardenBloom8": "園芸部", "Calligraphy10": "書道部", "TeaZen12": "茶道部",
        "PhotoSnap3": "写真部", "StarSky88": "天文部",
        "PrincipalZero0": "学園長", "StudentBase0": "一般生徒"
    };

    let currentTag = "";
    let isAdmin = false;

    // --- ✨ 復元処理（最優先で実行） ---
    window.onload = () => {
        // 1. まずLocalStorageから「以前の状態」を読み出す
        const savedAdmin = localStorage.getItem('isAdmin');
        const savedTag = localStorage.getItem('currentTag');

        // 2. URLにDiscordトークンがあるかチェック（ログイン直後）
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        
        if (token) {
            isAdmin = true;
            localStorage.setItem('isAdmin', 'true');
            // URLのトークンを消す
            history.replaceState(null, null, window.location.pathname);
        } else if (savedAdmin === 'true') {
            // トークンがなくても、保存データがあれば管理者として扱う
            isAdmin = true;
        }

        // 3. 管理者ならパネルを表示
        if (isAdmin) {
            document.getElementById('upload-panel').style.display = 'block';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
        }

        // 4. 部活の復元
        if (savedTag) {
            currentTag = savedTag;
            document.getElementById('club-display').innerText = currentTag + " のギャラリー";
            const select = document.getElementById('admin-club-select');
            select.value = currentTag;
            loadImages();
        }
    };

    // ログアウト（全リセット）
    function logout() {
        localStorage.clear(); // 全ての保存データを消去
        location.reload();
    }

    // パスワード入力時
    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            localStorage.setItem('currentTag', currentTag); // 保存
            document.getElementById('club-display').innerText = currentTag + " のギャラリー";
            loadImages();
        } else {
            alert("合言葉が違います");
        }
    }

    // 管理者リスト選択時
    function syncClub() {
        const select = document.getElementById('admin-club-select');
        if (select.value) {
            currentTag = select.value;
            localStorage.setItem('currentTag', currentTag); // 保存
            document.getElementById('club-display').innerText = currentTag + " のギャラリー (管理者)";
            loadImages();
        }
    }

    // 画像読み込み
    async function loadImages() {
        if (!currentTag) return;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "読み込み中...";
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?nocache=${Date.now()}`);
            const data = await res.json();
            gallery.innerHTML = "";
            if (data.resources.length === 0) {
                gallery.innerHTML = "<p>まだ画像がありません。</p>";
                return;
            }
            data.resources.forEach(img => {
                const card = document.createElement('div');
                card.className = 'img-card';
                const imgUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                card.innerHTML = `<img src="${imgUrl}" onclick="window.open('${imgUrl}', '_blank')">`;
                gallery.appendChild(card);
            });
        } catch (e) {
            gallery.innerHTML = "<p>読み込みに失敗しました。</p>";
        }
    }

    // アップロード
    async function uploadImage() {
        if(!currentTag) return alert("部活を選んでね");
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if(!file) return alert("画像を選んでね");
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'ml_default');
        formData.append('tags', currentTag);
        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            if(res.ok) { alert("投稿成功！"); fileInput.value = ""; loadImages(); }
        } catch (e) { alert("エラーが発生しました。"); }
    }

    // Discordログイン
    function loginDiscord() {
        const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify`;
        window.location.href = url;
    }
</script>

</body>
</html>
