<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放送広報フォトアルバム</title>
    <style>
        /* 基本スタイル */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f9; color: #333; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 20px; }

        /* 入力フォーム */
        .auth-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        input[type="password"], select { 
            padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; 
            font-size: 16px; width: 100%; box-sizing: border-box; 
        }

        /* 管理者パネル */
        .admin-panel { display: none; background: #eef2ff; padding: 15px; border-radius: 10px; border: 2px dashed #5865F2; margin: 20px 0; }
        
        /* スマホではみ出さないためのファイル選択設定 */
        input[type="file"] { 
            padding: 10px; margin: 10px 0; font-size: 14px; width: 100%; 
            background: #fff; border-radius: 5px; border: 1px solid #ddd; 
            box-sizing: border-box; display: block; 
        }

        /* ボタン類 */
        button { 
            cursor: pointer; transition: 0.2s; background: #5865F2; color: white; border: none; 
            font-weight: bold; padding: 12px; border-radius: 8px; margin: 5px 0; width: 100%; font-size: 16px;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .discord-btn { background: #7289da; }
        .logout-btn { background: #ff4757; font-size: 13px; padding: 8px; width: auto; min-width: 100px; }
        .upload-btn { background: #2ecc71; margin-top: 10px; }

        /* ギャラリー */
        #club-display { margin: 20px 0 10px; font-size: 1.2rem; color: #34495e; font-weight: bold; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 15px; }
        img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; border: 1px solid #eee; }
        
        #status-msg { color: #5865F2; font-size: 14px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ 放送広報フォトアルバム</h1>

    <div class="auth-section">
        <input type="password" id="pass-input" placeholder="合言葉を入力">
        <button onclick="checkPassword()">画像を見る</button>
        
        <div style="margin-top:15px;">
            <button id="login-btn" class="discord-btn" onclick="loginDiscord()">管理者ログイン (Discord)</button>
            <button id="logout-btn" class="logout-btn" onclick="logout()" style="display:none;">ログアウト</button>
        </div>
    </div>

    <div id="upload-panel" class="admin-panel">
        <h3 style="margin-top:0; font-size:1rem;">🛠 管理者メニュー</h3>
        <select id="admin-club-select" onchange="syncClub()">
            <option value="">-- 投稿先の部活を選択 --</option>
        </select>
        <input type="file" id="file-input" accept="image/*" multiple>
        <button class="upload-btn" onclick="uploadImages()">一括投稿する</button>
        <div id="status-msg"></div>
    </div>

    <h2 id="club-display">合言葉を入れてね</h2>
    <div id="gallery-container"></div>
</div>

<script>
    // --- 【設定】 ---
    const CLOUD_NAME = "dn8jcukh0";
    const CLIENT_ID = "1483619678940303410"; // ここにクライアントIDを入れる
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq1silbLpzyiWDBvelhaP30L_h8lqImVBHque9AbTGJ-VEIMjWfE8-k8jlddOGgFo9CbOoeaDqGSzX/pub?gid=0&single=true&output=csv"; 
    // ---------------

    let clubData = {};
    let currentTag = "";

    window.onload = async () => {
        await fetchClubList();

        // Discordログイン後のURLパラメータ解析
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        const savedAdmin = localStorage.getItem('isAdmin');

        if (token || savedAdmin === 'true') {
            showAdminPanel();
            if (token) {
                localStorage.setItem('isAdmin', 'true');
                // URLを綺麗にする（アクセストークンを隠す）
                history.replaceState(null, null, window.location.pathname);
            }
        }
    };

    async function fetchClubList() {
        try {
            const res = await fetch(SPREADSHEET_CSV_URL);
            if (!res.ok) throw new Error();
            const text = await res.text();
            const rows = text.split(/\r?\n/);
            const select = document.getElementById('admin-club-select');
            select.innerHTML = '<option value="">-- 投稿先の部活を選択 --</option>';
            
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const pass = cols[0].trim().replace(/^"|"$/g, '');
                    const name = cols[1].trim().replace(/^"|"$/g, '');
                    if (!pass || !name || pass.includes("initial-scale") || pass === "合言葉") return;
                    
                    clubData[pass] = name;
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                }
            });
        } catch (e) {
            console.error("スプシ読み込み失敗");
        }
    }

    function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        if (clubData[pass]) {
            currentTag = clubData[pass];
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        } else {
            alert("合言葉が違います");
        }
    }

    async function loadImages() {
        if (!currentTag) return;
        const container = document.getElementById('gallery-container');
        container.innerHTML = "読込中...";
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(currentTag)}.json?cb=${Date.now()}`);
            if (!res.ok) {
                container.innerHTML = res.status === 404 ? "<p>まだ画像がありません。</p>" : "<p>取得エラー</p>";
                return;
            }
            const data = await res.json();
            renderGallery(data.resources);
        } catch (e) {
            container.innerHTML = "<p>読み込み失敗</p>";
        }
    }

    function renderGallery(resources) {
        const container = document.getElementById('gallery-container');
        let html = '<div class="gallery">';
        resources.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        resources.forEach(img => {
            const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
            html += `<img src="${url}" onclick="window.open('${url}', '_blank')">`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function syncClub() {
        currentTag = document.getElementById('admin-club-select').value;
        if(currentTag) {
            document.getElementById('club-display').innerText = currentTag;
            loadImages();
        }
    }

    async function uploadImages() {
        const fileInput = document.getElementById('file-input');
        const files = fileInput.files;
        const status = document.getElementById('status-msg');
        if(!currentTag || files.length === 0) return alert("部活選択と画像選択をしてね");
        
        for (let i = 0; i < files.length; i++) {
            status.innerText = `${i+1}/${files.length}枚目をアップ中...`;
            const formData = new FormData();
            formData.append('file', files[i]);
            formData.append('upload_preset', 'ml_default');
            formData.append('tags', currentTag);
            try {
                await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            } catch (e) { console.error("Upload Error"); }
        }
        status.innerText = "完了！";
        fileInput.value = "";
        loadImages();
        setTimeout(() => { status.innerText = ""; }, 3000);
    }

    // Discord連携機能
    function loginDiscord() {
        const redirectUri = encodeURIComponent(window.location.href.split('#')[0]);
        const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=identify`;
        window.location.href = url;
    }

    function showAdminPanel() {
        document.getElementById('upload-panel').style.display = 'block';
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'inline-block';
    }

    function logout() {
        localStorage.removeItem('isAdmin');
        location.reload();
    }
</script>
</body>
</html>
